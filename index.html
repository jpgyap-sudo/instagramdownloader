<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instagram Video Downloader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fafafa; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .wrap { width: 100%; max-width: 520px; }
    .header { text-align: center; margin-bottom: 2rem; }
    .logo { width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
    .logo svg { width: 30px; height: 30px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    h1 { font-size: 22px; font-weight: 600; color: #111; }
    .sub { font-size: 14px; color: #888; margin-top: 4px; }
    .card { background: white; border: 1px solid #e5e5e5; border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; }
    input[type=text] { width: 100%; padding: 10px 14px; font-size: 14px; border: 1px solid #ddd; border-radius: 10px; background: #f9f9f9; color: #111; outline: none; margin-bottom: 1rem; }
    input:focus { border-color: #bc1888; background: white; }
    .row { display: flex; gap: 8px; }
    .row input { flex: 1; margin-bottom: 0; }
    .btn { padding: 10px 20px; font-size: 14px; font-weight: 600; border-radius: 10px; border: none; cursor: pointer; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-fetch { background: linear-gradient(135deg, #dc2743, #bc1888); color: white; }
    .btn-dl { background: #1a8a3e; color: white; width: 100%; margin-top: 12px; font-size: 15px; padding: 12px; }
    .btn-open { background: #555; color: white; width: 100%; margin-top: 8px; font-size: 14px; padding: 11px; display: none; }
    .status { font-size: 13px; padding: 10px 14px; border-radius: 10px; margin-top: 12px; display: none; }
    .info { background: #e8f0fe; color: #1a56db; display: block; }
    .error { background: #fde8e8; color: #c81e1e; display: block; }
    .success { background: #e8f7ee; color: #1a6e3e; display: block; }
    video { width: 100%; border-radius: 10px; border: 1px solid #eee; max-height: 380px; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="white" stroke="none"/></svg>
      </div>
      <h1>Instagram Video Downloader</h1>
      <p class="sub">Download Reels and videos instantly</p>
    </div>

    <div class="card">
      <label>Instagram Video / Reel URL</label>
      <div class="row">
        <input type="text" id="urlInput" placeholder="https://www.instagram.com/reel/..." />
        <button class="btn btn-fetch" id="fetchBtn" onclick="fetchVideo()">Fetch</button>
      </div>
      <div class="status" id="status"></div>
    </div>

    <div class="card" id="previewCard" style="display:none;">
      <video controls id="videoEl"></video>
      <button class="btn btn-dl" id="dlBtn" onclick="downloadVideo()">Download Video</button>
      <button class="btn btn-open" id="openBtn" onclick="window.open(videoUrl,'_blank')">Open in New Tab</button>
    </div>
  </div>

  <script>
    let videoUrl = '';

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
    }

    function setBusy(on) {
      const btn = document.getElementById('fetchBtn');
      btn.innerHTML = on ? '<span class="spinner"></span>Fetching...' : 'Fetch';
      btn.disabled = on;
    }

    function findVideoUrl(obj, depth) {
      depth = depth || 0;
      if (depth > 10 || !obj) return null;
      if (typeof obj === 'string' && obj.startsWith('http') && (obj.includes('.mp4') || obj.includes('video'))) return obj;
      if (Array.isArray(obj)) {
        for (var i = 0; i < obj.length; i++) { var r = findVideoUrl(obj[i], depth+1); if (r) return r; }
      } else if (typeof obj === 'object') {
        var keys = ['video_url','download_url','url','src','hd_url','sd_url','video_versions'];
        for (var k of keys) { if (obj[k]) { var r = findVideoUrl(obj[k], depth+1); if (r) return r; } }
        for (var k in obj) { var r = findVideoUrl(obj[k], depth+1); if (r) return r; }
      }
      return null;
    }

    async function fetchVideo() {
      const url = document.getElementById('urlInput').value.trim();
      document.getElementById('previewCard').style.display = 'none';
      document.getElementById('openBtn').style.display = 'none';

      if (!url.includes('instagram.com')) {
        setStatus('Please enter a valid Instagram URL.', 'error');
        return;
      }

      setBusy(true);
      setStatus('Fetching video...', 'info');

      try {
        const res = await fetch(`/api/fetch?url=${encodeURIComponent(url)}`);
        const data = await res.json();

        if (!res.ok || data.error) {
          setStatus('Error: ' + (data.error || 'Could not fetch video.'), 'error');
          setBusy(false);
          return;
        }

        const vid = findVideoUrl(data);
        if (!vid) {
          setStatus('No video found. The post may be private or not a video.', 'error');
          setBusy(false);
          return;
        }

        videoUrl = vid;
        const vEl = document.getElementById('videoEl');
        vEl.src = videoUrl;
        vEl.onerror = () => {
          document.getElementById('openBtn').style.display = 'block';
          document.getElementById('dlBtn').style.display = 'none';
        };
        document.getElementById('previewCard').style.display = 'block';
        setStatus('Video ready! Click download to save it.', 'success');
      } catch (e) {
        setStatus('Network error: ' + e.message, 'error');
      }

      setBusy(false);
    }

    async function downloadVideo() {
      if (!videoUrl) return;
      const btn = document.getElementById('dlBtn');
      btn.textContent = 'Downloading...';
      btn.disabled = true;
      try {
        const res = await fetch(videoUrl);
        const blob = await res.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'instagram_' + Date.now() + '.mp4';
        a.click();
        btn.textContent = 'Downloaded!';
      } catch {
        document.getElementById('openBtn').style.display = 'block';
        btn.textContent = 'Download Video';
      }
      btn.disabled = false;
    }

    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') fetchVideo();
    });
  </script>
</body>
</html>
